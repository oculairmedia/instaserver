<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Comments Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #fafafa;
        }
        .media-item {
            border: 1px solid #dbdbdb;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 3px;
            background-color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .media-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }
        .media-thumbnail {
            width: 100px;
            height: 100px;
            object-fit: cover;
            margin-right: 15px;
            border-radius: 3px;
        }
        .media-info {
            flex-grow: 1;
        }
        .comments-section {
            margin-top: 10px;
            border-top: 1px solid #dbdbdb;
            padding-top: 10px;
        }
        .comment {
            background-color: #fafafa;
            padding: 12px;
            margin: 5px 0;
            border-radius: 3px;
            border: 1px solid #efefef;
        }
        .reply {
            margin-left: 20px;
            background-color: #f8f8f8;
            border-left: 3px solid #dbdbdb;
        }
        .reply-form {
            margin: 10px 0;
        }
        .reply-form textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-bottom: 5px;
            resize: vertical;
        }
        .button {
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .button:hover {
            background-color: #0081d6;
        }
        .hidden {
            display: none;
        }
        .timestamp {
            color: #8e8e8e;
            font-size: 0.9em;
        }
        .username {
            color: #262626;
            font-weight: 600;
            text-decoration: none;
        }
        .username:hover {
            text-decoration: underline;
        }
        .caption {
            margin: 10px 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <h1>Instagram Comments Manager</h1>
    
    {% for media in media_list %}
    <div class="media-item">
        <div class="media-header">
            {% if media.thumbnail %}
            <img src="{{ media.thumbnail }}" alt="Post thumbnail" class="media-thumbnail">
            {% endif %}
            <div class="media-info">
                <div class="timestamp">{{ media.timestamp }}</div>
                <div class="caption">{{ media.caption }}</div>
                <div>Comments: {{ media.comments_count }}</div>
                <a href="{{ media.permalink }}" target="_blank" class="button" style="display: inline-block; margin-top: 10px;">View on Instagram</a>
            </div>
        </div>
        
        <button class="button" onclick="loadComments('{{ media.id }}')">Show Comments</button>
        
        <div id="comments-{{ media.id }}" class="comments-section hidden">
            <div id="comments-list-{{ media.id }}"></div>
        </div>
    </div>
    {% endfor %}

    <script>
    function loadComments(mediaId) {
        const commentsSection = document.getElementById(`comments-${mediaId}`);
        const commentsList = document.getElementById(`comments-list-${mediaId}`);
        
        if (commentsSection.classList.contains('hidden')) {
            fetch(`/media/${mediaId}/comments`)
                .then(response => response.json())
                .then(comments => {
                    if (comments.error) {
                        throw new Error(comments.error);
                    }
                    commentsList.innerHTML = '';
                    comments.forEach(comment => {
                        const commentHtml = createCommentHtml(comment);
                        commentsList.innerHTML += commentHtml;
                    });
                    commentsSection.classList.remove('hidden');
                })
                .catch(error => {
                    alert('Error loading comments: ' + error.message);
                });
        } else {
            commentsSection.classList.add('hidden');
        }
    }

    function createCommentHtml(comment) {
        let html = `
            <div class="comment">
                <a href="https://instagram.com/${comment.username}" target="_blank" class="username">@${comment.username}</a>
                <span class="timestamp">${new Date(comment.timestamp).toLocaleString()}</span><br>
                ${comment.text}
                <div class="reply-form">
                    <textarea id="reply-${comment.id}" placeholder="Write a reply..."></textarea>
                    <button class="button" onclick="postReply('${comment.id}')">Reply</button>
                </div>
            </div>
        `;

        if (comment.replies && comment.replies.length > 0) {
            comment.replies.forEach(reply => {
                html += `
                    <div class="comment reply">
                        <a href="https://instagram.com/${reply.username}" target="_blank" class="username">@${reply.username}</a>
                        <span class="timestamp">${new Date(reply.timestamp).toLocaleString()}</span><br>
                        ${reply.text}
                    </div>
                `;
            });
        }

        return html;
    }

    function postReply(commentId) {
        const textarea = document.getElementById(`reply-${commentId}`);
        const message = textarea.value.trim();
        
        if (!message) return;

        fetch(`/comment/${commentId}/reply`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ message })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                textarea.value = '';
                // Add the new reply to the UI
                const commentDiv = textarea.closest('.comment');
                const replyHtml = `
                    <div class="comment reply">
                        <a href="https://instagram.com/${data.reply.username}" target="_blank" class="username">@${data.reply.username}</a>
                        <span class="timestamp">${new Date(data.reply.timestamp).toLocaleString()}</span><br>
                        ${data.reply.text}
                    </div>
                `;
                commentDiv.insertAdjacentHTML('afterend', replyHtml);
            } else {
                throw new Error(data.error);
            }
        })
        .catch(error => {
            alert('Error posting reply: ' + error.message);
        });
    }
    </script>
</body>
</html>

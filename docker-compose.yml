version: "3.8"
services:
  instagram-comments:
    build: .
    image: oculair/instarammidleware:latest
    ports:
      - 54088:54068
    environment:
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID}
      - APP_SECRET=${APP_SECRET}
      - WEBHOOK_VERIFY_TOKEN=${WEBHOOK_VERIFY_TOKEN}
      - FACEBOOK_ACCESS_TOKEN=${FACEBOOK_ACCESS_TOKEN}
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:54068/debug
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
        tag: "{{.Name}}"
        labels: production
networks: {}

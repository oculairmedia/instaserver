version: '3.8'

services:
  instagram-comments:
    image: oculair/instarammidleware:latest
    ports:
      - "54068:54068"
    environment:
      - INSTAGRAM_USERNAME=${INSTAGRAM_USERNAME}
      - INSTAGRAM_PASSWORD=${INSTAGRAM_PASSWORD}
      - INSTAGRAM_APP_ID=${INSTAGRAM_APP_ID}
      - APP_SECRET=${APP_SECRET}
      - BUSINESS_ACCOUNT_ID=${BUSINESS_ACCOUNT_ID}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:54068/debug"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  instagram_data: